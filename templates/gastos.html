<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Gastos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="bi bi-cash-stack"></i>
            Gestión de Gastos
        </h2>

        <button class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#modalNuevo">

            <i class="bi bi-plus-circle"></i>
            Nuevo Gasto

        </button>

    </div>


    <table class="table table-bordered table-hover table-striped">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Valor</th>
           <th class="text-center" style="width:100px;">
            Fecha
                </th>
            <th>Registrado</th>
            <th width="150">Acciones</th>
            

        </tr>

        </thead>

        <tbody>

        {% for g in gastos %}

        <tr>

            <td>{{ g.id_gasto }}</td>

            <td>{{ g.nombre }}</td>

            <td>{{ g.descripcion }}</td>

            <td class="fw-bold fs-5 text-success px-4">
                        ${{ "{:,.0f}".format(g.valor) }}
                    </td>

            <td>{{ g.fecha_gasto }}</td>
            <td>
        {{ g.fecha_registro.strftime('%d/%m/%Y %H:%M') }}
    </td>

            <td>

                <button
                        class="btn btn-warning btn-sm"

                        onclick="editarGasto(
                            '{{g.id_gasto}}',
                            '{{g.nombre}}',
                            '{{g.descripcion}}',
                            '{{g.valor}}',
                            '{{g.fecha_gasto}}'
                        )">

                    <i class="bi bi-pencil"></i>

                </button>

                <a href="{{ url_for('gastos.eliminar_gasto',id_gasto=g.id_gasto) }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar este gasto?')">

                    <i class="bi bi-trash"></i>

                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>


<!-- NUEVO -->

<div class="modal fade" id="modalNuevo">

<div class="modal-dialog">

<div class="modal-content">

<form method="POST"
      action="{{ url_for('gastos.guardar_gasto') }}">

<div class="modal-header">

<h5>Nuevo Gasto</h5>

<button class="btn-close"
        data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Descripción</label>

<textarea
name="descripcion"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Valor</label>

<input
type="number"
step="0.01"
min="0"
name="valor"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Fecha del gasto</label>

<input
type="date"
name="fecha_gasto"
class="form-control"
value="{{ moment().strftime('%Y-%m-%d') if moment else '' }}"
required>

</div>

</div>

<div class="modal-footer">

<button class="btn btn-secondary"
        data-bs-dismiss="modal">

Cancelar

</button>

<button class="btn btn-success">

Guardar

</button>

</div>

</form>

</div>

</div>

</div>



<!-- EDITAR -->

<div class="modal fade"
     id="modalEditar">

<div class="modal-dialog">

<div class="modal-content">

<form method="POST"
      action="{{ url_for('gastos.editar_gasto') }}">

<input
type="hidden"
name="id_gasto"
id="id_gasto">

<div class="modal-header">

<h5>Editar Gasto</h5>

<button class="btn-close"
        data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
id="nombre"
name="nombre"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Descripción</label>

<textarea
id="descripcion"
name="descripcion"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Valor</label>

<input
type="number"
step="0.01"
id="valor"
name="valor"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Fecha</label>

<input
type="date"
id="fecha_gasto"
name="fecha_gasto"
class="form-control"
required>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancelar

</button>

<button
class="btn btn-primary">

Actualizar

</button>

</div>

</form>

</div>

</div>

</div>



<script>

function editarGasto(
id,
nombre,
descripcion,
valor,
fecha){

document.getElementById("id_gasto").value=id;

document.getElementById("nombre").value=nombre;

document.getElementById("descripcion").value=descripcion;

document.getElementById("valor").value=valor;

document.getElementById("fecha_gasto").value=fecha;

new bootstrap.Modal(
document.getElementById("modalEditar")
).show();

}

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
